<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LÚMEN — A Biblioteca de Elin</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="stage">
      <header class="title">
        <h1>LÚMEN</h1>
        <p>A Biblioteca de Elin</p>
      </header>

      <canvas id="gameCanvas" width="900" height="600" aria-label="Área do jogo LÚMEN"></canvas>

      <section class="controls" aria-label="Controles do jogo">
        <span><kbd>←</kbd><kbd>→</kbd> / <kbd>A</kbd><kbd>D</kbd> Mover</span>
        <span><kbd>↑</kbd> / <kbd>W</kbd> Pular</span>
        <span><kbd>Espaço</kbd> Lanterna de Éter</span>
        <span><kbd>X</kbd> / <kbd>Enter</kbd> Atacar</span>
        <span><kbd>E</kbd> Ataque Especial</span>
      </section>
    </main>

    <!-- ES Modules: ponto de entrada -->
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
